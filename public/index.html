<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>Akisa Voice</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Login -->
    <div id="login-screen" class="screen">
      <div class="logo">🎙️</div>
      <h1>Akisa</h1>
      <p class="subtitle">Your voice-first personal AI</p>
      <button id="login-btn" class="btn-google">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
    </div>

    <!-- Voice -->
    <div id="voice-screen" class="screen hidden">
      <div id="status-bar">
        <span id="status-text">Ready</span>
        <span id="speaker-badge" class="hidden"></span>
        <div id="status-actions">
          <button id="settings-btn" class="btn-icon" title="Voice Profiles">👤</button>
          <button id="logout-btn" class="btn-icon" title="Sign out">⏻</button>
        </div>
      </div>
      <div id="transcript-area"><div id="transcript"></div></div>
      <div id="mic-container">
        <div id="pulse-ring"></div>
        <button id="mic-btn" class="mic-button">
          <svg id="mic-icon" viewBox="0 0 24 24" width="36" height="36" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          <svg id="stop-icon" class="hidden" viewBox="0 0 24 24" width="36" height="36" fill="white"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
      <p id="mic-hint">Tap to start talking</p>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="overlay hidden">
      <div class="panel">
        <div class="panel-header">
          <h2>Voice Profiles</h2>
          <button id="settings-close" class="btn-icon">✕</button>
        </div>
        <p class="panel-desc">Enroll voice IDs so Akisa knows who's speaking.</p>
        <div id="family-list"></div>
      </div>
    </div>

    <!-- Text Input Overlay -->
    <div id="text-input-overlay" class="overlay hidden">
      <div class="panel">
        <p id="text-input-prompt"></p>
        <input id="text-input-field" type="text" autocomplete="off" />
        <button id="text-input-submit" class="btn-primary">Submit</button>
      </div>
    </div>

    <!-- Enrollment Overlay -->
    <div id="enroll-overlay" class="overlay hidden">
      <div class="panel enroll-panel">
        <h2 id="enroll-title">Enrolling...</h2>
        <div id="enroll-animation" class="enroll-anim">🎤</div>
        <p id="enroll-status">Speak naturally for 8 seconds...</p>
        <button id="enroll-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/voiceid.js"></script>
  <script src="/app.js"></script>
</body>
</html>
