<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#060610">
  <title>Akisa</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-state="idle">
  <div id="app">
    <div id="login-screen" class="screen">
      <div class="orb-preview"><div class="orb-layer orb-1"></div><div class="orb-layer orb-2"></div><div class="orb-layer orb-3"></div></div>
      <h1>Akisa</h1>
      <p class="subtitle">Voice-first personal AI</p>
      <button class="btn-google" onclick="signIn()"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Sign in with Google</button>
    </div>

    <div id="voice-screen" class="screen hidden">
      <div id="orb-scene" onclick="toggleConnection()">
        <div id="orb-glow"></div>
        <div id="orb"><div class="orb-layer orb-1"></div><div class="orb-layer orb-2"></div><div class="orb-layer orb-3"></div><div class="orb-layer orb-4"></div></div>
        <div id="orb-ring-1"></div><div id="orb-ring-2"></div>
      </div>
      <div id="top-bar">
        <div id="status-left"><span id="status-text">Tap the orb</span><span id="speaker-badge" class="hidden"></span></div>
        <div id="status-actions">
          <button class="btn-icon" onclick="openSettings()">👤</button>
          <button class="btn-icon" onclick="signOut()">⏻</button>
        </div>
      </div>
      <div id="transcript-area"><div id="transcript"></div></div>
    </div>

    <div id="settings-panel" class="overlay hidden">
      <div class="panel"><div class="panel-header"><h2>Voice Profiles</h2><button class="btn-icon" onclick="closeSettings()">✕</button></div>
      <p class="panel-desc">Enroll voice IDs so Akisa recognizes who's speaking.</p>
      <div id="family-list"></div></div>
    </div>

    <div id="enroll-overlay" class="overlay hidden"><div class="panel enroll-panel"></div></div>

    <div id="text-input-overlay" class="overlay hidden">
      <div class="panel"><p id="text-input-prompt"></p>
      <input id="text-input-field" type="text" autocomplete="off" />
      <button class="btn-primary" onclick="submitTextInput()">Submit</button></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/voiceid.js"></script>
  <script src="/app.js"></script>
</body>
</html>
